<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">
        
        <title>Buat Laporan Baru</title>
         <style>
            body{
                font-family: Arial, sans-serif;
                margin: 15px;
            }
            h1{
                text-align: center;
            }
            p{
                text-align: center;
            }
            button{
                width: 100%;
                padding: 15px;
                margin-top: 10px;
                border-radius: 10px;
            }
            table{
                width: 100%;
            }
        </style>
        <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> 
    </head>
       
    <body>
        <a href="Halaman_Utama.html">
            <- Kembali
        </a>
        
        <h1>SILANDAK</h1>
        <H2>Form Pengaduan</H2>
        <form action="/api/pengaduan/tambah"
              method="post" onsubmit="return validasiForm();">
            <label>Nama Pelapor</label>
            <br>
            <input type="text" name="nama_pelapor" required>
            
            <br><br>
            <label>No Telepon</label>
            <br>
            <input type="text" name="no_telepon" required required pattern="[0-9]+" title="Nomor Telepon Hanya Boleh Angka">
            
            <br><br>
            <label>Alamat Pelapor</label>
            <br>
            <input type="text" name="alamat_pelapor">
            
            <br><br>
            <label>Deskripsi Kejadian</label>
            <br>
            <textarea rows="5" cols="40" name="deskripsi" required></textarea>
            
            <label>Waktu Kejadian</label>
            <br>
            <input type="datetime-local"
                   name="waktu_kejadian" required>
            <br><br>
            
            <br><br>
            <label>Alamat</label>
            <br>
            <input type="text" name="alamat_kejadian" size="50">
            
            <br><br>
            <div id="map"
                 style="height:400px;width:100%;"></div>
                 <br>
                 <label>latitude</label>
                 <br>
                 <input type="text" id="latitude"
                        name="latitude" readonly>
                 <br><br>
                 <label>longitude</label>
                 <br>
                 <input type="text" id="longitude"
                        name="longitude" readonly>
                 <br><br>
                 <button type="button"
                     onclick="ambilLokasi()">
                             Gunakan Lokasi Saya
                 </button>
            
            <br><br>
            <label>Upload Bukti</label>
            <br>
            <input type="file">
            
            <br><br>
            <button type="submit">
                    Kirim Laporan
            </button>
        </form>
        
        <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        
        <script>
            var map = L.map('map').setView([-6.2,106.8],13);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
                maxZoom:19
            }).addTo(map);
            var marker;
            map.on('click', function(e){
                if(marker){
                    map.removeLayer(marker);
                }
                marker = L.marker(e.latlng).addTo(map);
                document.getElementById('latitude').value = e.latlng.lat;
                document.getElementById('longitude').value = e.latlng.lng;
            });
            
            function ambilLokasi(){
                navigator.geolocation.getCurrentPosition(function(position){
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    
                    map.setView([lat,lng],16);
                    if(marker){
                        map.removeLayer(marker);
                    }
                    marker = L.marker([lat,lng]).addTo(map);
                    
                    document.getElementById('latitude').value = lat;
                    document.getElementById('longitude').value = lng;
                });
            }
        </script>
        
        <script>
            function validasiForm(){
                
                let nama =
                        document.getElementsByName("nama_pelapor")
                [0].value;
                let telp = 
                        document.getElementsByName("no_telepon")
                [0].value;
                let alamat =
                        document.getElementsByName("alamat_kejadian")
                [0].value;
                let lat =
                        document.getElementById("latitude").value;
                let lng =
                        document.getElementById("longitude").value;
                
                if (nama.trim() === ""){
                    alert("Nama Pelapor Harus Di isi !");
                    return false;
                }
                if (telp.trim() === ""){
                    alert("No Telepon Harus Di isi");
                    return false;
                }
                //Script wajib isi salah satu alamat atau pin
                if(alamat.trim() === "" && (lat.trim() === "" || lng.trim() === "")){
                    alert("isi Alamat Kejadian Atau Pilih Lokasi Pada Peta !");
                    return false;
                }
                return true;
            }
        </script>
    </body>
</html>
