<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">
        
        <title>Buat Laporan Baru</title>
         <style>
             *{
                 box-sizing:border-box;
             }
            body{
                margin: 0;
                padding: 15px;
                background: #f3f5f7;
                font-family: Arial, sans-serif;
            }
            body::before{
                content: "";
                position: fixed;
                inset: 0;
                
                top: 50%;
                left:50%;
                transform: translate(-50%, -50%);
                
                width: 450px;
                height: 450px;
                
                background:url("images/SILANDAK_Logo.png");
                background-repeat: no-repeat;
                background-position: center;
                background-size: contain;
                
                opacity: 1;
                
                z-index: 0;
                pointer-events: none;
            }
            .container{
                position: relative;
                z-index: 1;
                
                width:min(100%,480px);
                max-width: 480px;
                margin: 0 auto;
                
                background : rgba(255,255,255,0.75);
                border-radius: 20px;
                padding: 20px;
                box-shadow: 0 4px 15px rgba(0,0,0,.15);
            }
            .coordinate{
                display: flex;
                gap: 15px;
                margin-top: 10px;
            }
            .coordinate > div {
                flex: 1;
            }
            .coordinate input{
                width: 100%;
                box-sizing: border-box;
            }
            .header{
                position: relative;
                background: linear-gradient(to bottom, #c62828 0%, #c53935 40%, #ffffff 100%);
                color: #212121;
                padding: 20px;
                margin: -20px -20px 15px -20px;
                border-radius: 20px 20px 0 0;
                text-align: center;
            }
            .back-btn{
                position: absolute;
                left: 15px;
                top: 18px;
                
                width: 36px;
                height: 36px;
                
                display: flex;
                justify-content: center;
                align-items: center;
                
                border-radius: 50%;
                background: rgba(0,0,0,.15);
                color: white;
                font-size: 22px;
                text-decoration: none;
                
                transition: .2s;
            }
            .back-btn.hover{
                background: #d32f2f;
            }
            .header h1{
                color: white;
                margin-top: 20px;
                margin-bottom: 3px;
                font-size: 36px;
                font-weight: 800;
                -webkit-text-stroke: 1.5px black;
                text-shadow:
                    2px 2px 4px rgba(0,0,0,.45);
            }
            .header p{
                color: #333;
                margin-top: 0px;
                color: rgba(255,255,255,0.9);
                font-size: 15px;
                font-weight: 700;
                text-shadow:
                    1.5px 1.5px 2.5px rgba(0,0,0,.6);
            }
            .back{
                color: #ff5252;
                text-decoration: none;
                font-weight: bold;
                position: absolute;
                left: 20px;
                top: 18px;
            }
            h1,h2,p{
                text-align: center;
            }
            label{
                display: block;
                margin-top: 15px;
                margin-bottom: 5px;
                font-weight: bold;
            }
            input,textarea,select{
                width: 100%;
                padding: 12px;
                border: 1px solid #ccc;
                border-radius: 10px;
                font-size: 16px;
                
            }
            textarea{
                resize: vertical;
            }
            button{
                width: 100%;
                padding: 15px;
                margin-top: 15px;
                border: none;
                border-radius: 12px;
                background: #d32f2f;
                color: white;
                font-size: 16px;
                font-weight: bold;
            }
            button[type="button"]{
                background: #1976d2;
                color: white;
            }
            button[type="submit"]{
                background: #d32f2f;
                color: white;
            }
            button:hover{
                background: #b71c1c;
            }
            #map{
                width: 100%;
                height: 250px;
                border-radius: 15px;
                margin: 15px 0;
            }
            a{
                text-decoration: none;
                color: #d32f2f;
                font-weight: bold;
            }
            h2{
                margin: 10px 0px 25px;
                color: #212121;
                font-size: 24px;
            }
            input[type="file"]{
                width: 100%;
            }
        </style>
        <link rel="stylesheet"
          href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/> 
    </head>
       
    <body>
        <div class="container">
            <div class="header">
                <a href="Halaman_Utama.html" class="back-btn">
                    &#8592;
                </a>
                <h1>SILANDAK</h1>
                <p>Sistem Layanan dan Pengaduan Damkar</p>
            </div>
        
        <H2>FORM PENGADUAN</H2>
        <form action="/api/pengaduan/tambah"
              method="post" 
              onsubmit="return validasiForm();">
            <label>Nama Pelapor</label>
            <input type="text" name="nama_pelapor" required>
            
            <br><br>
            <label>No Telepon</label>
            <input type="text" name="no_telepon" required pattern="[0-9]+" title="Nomor Telepon Hanya Boleh Angka">
            
            <br><br>
            <label>Alamat Pelapor</label>
            <input type="text" name="alamat_pelapor">
            
            <br><br>
            <label>Deskripsi Kejadian</label>
            <textarea rows="5" name="deskripsi" required></textarea>
            
            <label>Waktu Kejadian</label>
            <input type="datetime-local"
                   name="waktu_kejadian" required>
            
            <br><br>
            <label>Alamat</label>
            <input type="text" name="alamat_kejadian">
            
            <br><br>
            <div id="map"></div>
                 <div class="coordinate">
                     <div>
                        <label>latitude</label>
                        <input type="text" 
                               id="latitude"
                               name="latitude" 
                               readonly>
                     </div>
                     
                     <div>
                        <label>longitude</label>
                        <input type="text" 
                               id="longitude"
                               name="longitude" 
                               readonly>
                     </div>
                 </div>
                 
                 <button type="button"
                     onclick="ambilLokasi()">
                             Gunakan Lokasi Saya
                 </button>
            
            <br><br>
            <label>Upload Bukti</label>
            <input type="file" id="foto" accept="image/*" required>
            <input type="hidden"
                   id="foto_bukti"
                   name="foto_bukti">
            
            <br><br>
            
            <img id="preview"
                 src=""
                 style="display : none;
                        width: 250px;
                        border-radius: 10px;
                        border: 1px solid#ccc;">
            
            <button type="submit">
                    Kirim Laporan
            </button>
        </form>
        
        <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        
        <script>
            var map = L.map('map').setView([-6.2,106.8],13);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
                maxZoom:19
            }).addTo(map);
            var marker;
            map.on('click', function(e){
                if(marker){
                    map.removeLayer(marker);
                }
                marker = L.marker(e.latlng).addTo(map);
                document.getElementById('latitude').value = e.latlng.lat;
                document.getElementById('longitude').value = e.latlng.lng;
            });
            
            function ambilLokasi(){
                navigator.geolocation.getCurrentPosition(function(position){
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    
                    map.setView([lat,lng],16);
                    if(marker){
                        map.removeLayer(marker);
                    }
                    marker = L.marker([lat,lng]).addTo(map);
                    
                    document.getElementById('latitude').value = lat;
                    document.getElementById('longitude').value = lng;
                });
            }
        </script>
        
        <script>
            function validasiForm(){
                
                let nama =
                        document.getElementsByName("nama_pelapor")
                [0].value;
                let telp = 
                        document.getElementsByName("no_telepon")
                [0].value;
                let alamat =
                        document.getElementsByName("alamat_kejadian")
                [0].value;
                let lat =
                        document.getElementById("latitude").value;
                let lng =
                        document.getElementById("longitude").value;
                let foto =
                        document.getElementById("foto_bukti").value;
                
                if (nama.trim() === ""){
                    alert("Nama Pelapor Harus Di isi !");
                    return false;
                }
                if (telp.trim() === ""){
                    alert("No Telepon Harus Di isi");
                    return false;
                }
                //Script wajib isi salah satu alamat atau pin
                if(alamat.trim() === "" && (lat.trim() === "" || lng.trim() === "")){
                    alert("isi Alamat Kejadian Atau Pilih Lokasi Pada Peta !");
                    return false;
                }
                if(foto.trim() === ""){
                    alert("Upload Bukti Harus Di Isi !");
                    return false;
                }
                //Cek Converter base64
                //alert(document.getElementById("foto_bukti").value.substring(0,50));
                return true;
            }
        </script>
        
        <script>
            document.getElementById("foto").addEventListener("change", function(){
                const file = this.files[0];
                if(!file) return;
                //Preview Gambar Bukti
                document.getElementById("preview").src = URL.createObjectURL(file);
                document.getElementById("preview").style.display = "block";
                //base64
                const reader = new FileReader();
                reader.onload = function(e){
                    document.getElementById("foto_bukti").value = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        </script>
        </div>
    </body>
</html>
